services:
  - type: web
    name: smartlife-proxy
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROXY_TOKEN
        generateValue: true
      - key: TUYA_CLIENT_ID
        sync: false
      - key: TUYA_CLIENT_SECRET
        sync: false
      - key: TUYA_REGION
        value: eu
      - key: TUYA_API_HOST
        sync: false
      - key: TUYA_DEVICE_IDS
        sync: false
      - key: TUYA_DEVICE_NAMES
        value: "{}"
      - key: SMARTLIFE_SWITCH_CODE
        value: switch_led
      - key: SMARTLIFE_BRIGHTNESS_CODE
        value: bright_value_v2
      - key: SMARTLIFE_BRIGHTNESS_MIN
        value: "10"
      - key: SMARTLIFE_BRIGHTNESS_MAX
        value: "1000"
      - key: CACHE_TTL_SECONDS
        value: "8"
      - key: REQUEST_TIMEOUT_MS
        value: "10000"
