name: Refresh Performance JSON

on:
  schedule:
    - cron: "0 */12 * * *" # Every 12 hours
    # For once per day instead, replace the line above with:
    # - cron: "0 3 * * *" # Every 24 hours at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        env:
          BACKEND_SNAPSHOT_URL: ${{ secrets.BACKEND_SNAPSHOT_URL }}
        run: |
          if [ -z "$BACKEND_SNAPSHOT_URL" ]; then
            echo "Missing repository secret: BACKEND_SNAPSHOT_URL"
            exit 1
          fi

      - name: Fetch backend snapshot
        env:
          BACKEND_SNAPSHOT_URL: ${{ secrets.BACKEND_SNAPSHOT_URL }}
          SNAPSHOT_AUTH_BEARER: ${{ secrets.SNAPSHOT_AUTH_BEARER }}
        run: |
          set -euo pipefail
          mkdir -p dist/data
          TMP_FILE="$(mktemp)"

          if [ -n "${SNAPSHOT_AUTH_BEARER}" ]; then
            curl -fsSL \
              -H "Authorization: Bearer ${SNAPSHOT_AUTH_BEARER}" \
              "${BACKEND_SNAPSHOT_URL}" > "${TMP_FILE}"
          else
            curl -fsSL "${BACKEND_SNAPSHOT_URL}" > "${TMP_FILE}"
          fi

          jq -e . "${TMP_FILE}" > /dev/null
          jq -S . "${TMP_FILE}" > dist/data/performance-live.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
